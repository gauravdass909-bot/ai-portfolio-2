<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <main class="card">
            <!-- Left Side: Image/Visual -->
            <div class="visual-section">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 22H22L12 2Z" fill="white"/>
                    </svg>
                    <span>AI Portfolio</span>
                </div>
                <img src="assets/hero.png" alt="AI Dashboard and 3D Elements" class="hero-image">
            </div>

            <!-- Right Side: Content -->
            <div class="content-section">
                <header class="navigation">
                    <nav>
                        <a href="#projects">Projects</a>
                        <a href="#skills">Skills</a>
                        <a href="#about">About</a>
                    </nav>
                    <a href="#contact" class="btn-primary">View Demo</a>
                </header>

                <div class="main-content">
                    <h1 class="headline">Advanced AI solutions for modern businesses</h1>
                    <p class="subheadline">Whether you're launching, growing, or simply seeking a smarter way to automate your workflows, my cutting-edge AI capabilities are here to help.</p>
                </div>

                <div class="stats-section">
                    <div class="stat-block">
                        <div class="stat-icon red-icon"></div>
                        <h2 class="stat-number">50+</h2>
                        <p class="stat-label">Projects delivered</p>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-block">
                        <div class="stat-icon yellow-icon"></div>
                        <h2 class="stat-number">10x</h2>
                        <p class="stat-label">Efficiency increase</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
